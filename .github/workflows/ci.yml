# Build + smoke-test the framework on every PR and every push to main.
#
# We run the full `lake build` (all targets including every Smoke binary,
# the Auth.Proof / SafeQuery PoCs, and `leanjs_spec`) and then execute
# the smoke binaries that **run to completion** (not the demo servers
# that block on `serve` / stdio).
#
# Intentionally skipped:
#   * http_smoke / http_client_smoke / jsonrpc_smoke — they `serve` and
#     block forever (these are demo binaries, not regression tests).
#   * browser_vision_smoke / openai_smoke / mysql_smoke /
#     memcached_smoke / backend_smoke — need a live external service
#     (LM Studio / MySQL / memcached / browser bridge) that GitHub
#     runners don't have.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Valkey rides GitHub's `services:` block (its container image's
    # default CMD `valkey-server` does the right thing). MinIO needs
    # `minio server /data` as the command and `services:` can't set
    # commands, so we spin it up via `docker run` in a step below.
    services:
      valkey:
        image: valkey/valkey:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping || redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      postgres:
        image: postgres:16
        ports:
          - 5432:5432
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install elan + Lean toolchain
        run: |
          set -euo pipefail
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Show toolchain
        run: |
          lean --version
          lake --version
          node --version

      - name: Cache Lake build artifacts
        uses: actions/cache@v4
        with:
          path: .lake
          key: ${{ runner.os }}-lake-${{ hashFiles('lean-toolchain', 'lakefile.lean', 'lake-manifest.json') }}
          restore-keys: |
            ${{ runner.os }}-lake-

      - name: Install libpq-dev (for the LEANTEA_POSTGRES=1 build)
        run: sudo apt-get update && sudo apt-get install -y libpq-dev

      - name: Start MinIO (S3-compatible) sidecar
        run: |
          docker run -d --rm --name leantea-minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=test \
            -e MINIO_ROOT_PASSWORD=testtest1234 \
            minio/minio:latest server /data
          # Wait for /minio/health/live
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:9000/minio/health/live > /dev/null; then
              echo "MinIO up after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Build CI test binaries
        env:
          LEANTEA_POSTGRES: "1"
        run: lake build persist_spec security_spec pure_spec auth_spec auth_idp_serve valkey_smoke s3_smoke postgres_smoke webdav_serve webdav_smoke leanjs_spec

      # ──────────────────────────────────────────────────────────────
      # Self-contained smoke binaries. Each one is an LSpec-shaped
      # runner; exit non-zero on the first failure.
      # ──────────────────────────────────────────────────────────────

      - name: Persistence integration (Sqlite + Query DSL + Migrate + Auth.Proof + SafeQuery, ~32 LSpec assertions)
        run: ./.lake/build/bin/persist_spec

      - name: Construction-time security (SafeHtml + SafePath + SafeCmd + SafeHeader + SafeRedirect, ~60 LSpec assertions)
        run: ./.lake/build/bin/security_spec

      - name: Pure subsystems (Template + Crypto + JWT + SAML + Auth.Security, ~36 LSpec assertions)
        run: ./.lake/build/bin/pure_spec

      - name: Auth integration (OAuth2 round-trip via in-process IdP subprocess + SAML fixtures, ~17 LSpec assertions)
        run: ./.lake/build/bin/auth_spec

      - name: Valkey driver (RESP round-trip against the `services:` valkey container, 8 LSpec assertions)
        run: ./.lake/build/bin/valkey_smoke

      - name: S3 / object storage (SigV4 round-trip against MinIO sidecar, 6 LSpec assertions)
        run: ./.lake/build/bin/s3_smoke

      - name: PostgreSQL driver (libpq round-trip against the `services:` postgres container, 8 LSpec assertions)
        env:
          PG_CONN_STR: postgresql://postgres:postgres@127.0.0.1:5432/postgres
        run: ./.lake/build/bin/postgres_smoke

      - name: WebDAV server (OPTIONS / MKCOL / PUT / GET / PROPFIND / DELETE round-trip via spawned subprocess, 11 LSpec assertions)
        run: ./.lake/build/bin/webdav_smoke

      - name: LeanJs spec runner (parser + check + codegen + eval cross-check)
        run: ./.lake/build/bin/leanjs_spec

      - name: Tear down MinIO
        if: always()
        run: docker rm -f leantea-minio || true
