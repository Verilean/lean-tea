# Build the lean-elm book (docs/*.md) into a static site and deploy
# to GitHub Pages on every push to `main`. The site generator is the
# `gen_site` Lean executable; everything renders through
# LeanTea.Markdown + LeanTea.Css.

name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow only one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install elan + Lean toolchain
        run: |
          set -euo pipefail
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Show toolchain
        run: |
          lean --version
          lake --version

      - name: Cache Lake build artifacts
        uses: actions/cache@v4
        with:
          path: .lake
          key: ${{ runner.os }}-lake-${{ hashFiles('lean-toolchain', 'lakefile.lean', 'lake-manifest.json') }}
          restore-keys: |
            ${{ runner.os }}-lake-

      - name: Build the site generator
        run: lake build gen_site

      - name: Run gen_site (docs/ → docs-site/)
        run: |
          ./.lake/build/bin/gen_site
          ls -la docs-site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
