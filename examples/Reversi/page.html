<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Reversi (LeanJs subset)</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #0f172a;
      color: #e2e8f0;
      font-family: 'Segoe UI', sans-serif;
    }
    h1 { text-align: center; color: #38bdf8; }
    #wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 24px;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(8, 52px);
      grid-template-rows:    repeat(8, 52px);
      gap: 2px;
      background: #334155;
      padding: 6px;
      border-radius: 8px;
    }
    .cell {
      background: #065f46;
      color: #fff;
      font-size: 28px;
      border: none;
      cursor: pointer;
      border-radius: 4px;
      line-height: 1;
    }
    .cell:hover { background: #047857; }
    .hud {
      font-size: 18px;
      background: #1e293b;
      padding: 8px 16px;
      border-radius: 6px;
    }
    button.reset {
      background: #334155;
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
    }
  </style>
</head>
<body>
<div id="wrap">
  <h1>Reversi</h1>
  {{errorBanner}}
  <div id="app"></div>
  <button id="reset" class="reset">Reset</button>
  <p style="color:#94a3b8;font-size:12px">
    Logic compiled from
    <code>examples/Reversi/Game.leanjs</code>. x = black (you go first), o = white.
  </p>
</div>
<script>
{{gameJs}}

let model = initModel;
function render() {
  document.getElementById('app').innerHTML = view(model);
}
document.addEventListener('click', (e) => {
  const i = e.target && e.target.dataset && e.target.dataset.i;
  if (i === undefined) return;
  model = update(parseInt(i, 10), model);
  render();
});
document.getElementById('reset').onclick = () => {
  model = initModel;
  render();
};
render();
</script>
</body>
</html>
